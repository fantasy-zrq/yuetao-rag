mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml

server:
  port: 9596
  servlet:
    context-path: /yuetaoRag

sa-token:
  # 前后端统一使用 Authorization 头传递 token，不走 Cookie 读写链路。
  token-name: Authorization
  is-read-header: true
  is-read-cookie: false
  # 开启动态 active-timeout 和自动续期后，活跃用户会在鉴权时刷新活跃时间。
  dynamic-active-timeout: true
  auto-renew: true
  # 兜底硬过期时间，具体 rememberMe / 当前会话时长由 app.auth 再细分。
  timeout: 2592000
  token-style: random-64

spring:
  application:
    name: YueTaoRag
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: postgres
    password: postgres
    url: jdbc:postgresql://172.18.58.216:5432/yuetaorag?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: YueTaoRag-HikariCP

  data:
    redis:
      host: 172.18.58.216
      port: 16379
      password: zrq123
      database: 2

rocketmq:
  name-server: 172.18.58.216:19876
  producer:
    group: yuetao-rag-producer
    send-message-timeout: 2000
    enable-msg-trace: true
  consumer:
    enable-msg-trace: true

rustfs:
  url: http://172.18.58.216:19000
  access-key-id: rustfsadmin
  secret-access-key: rustfsadmin
  bucket: yuetao-rag-docs
  public-base-url: http://172.18.58.216:19000/yuetao-rag-docs

app:
  ai:
    providers:
      bailian:
        url: https://dashscope.aliyuncs.com
        api-key: ${ALIYUN_ACCESS_KEY_ID:}
        endpoints:
          chat: /compatible-mode/v1/chat/completions
          embedding: /compatible-mode/v1/embeddings
          rerank: /api/v1/services/rerank/text-rerank/text-rerank
      siliconflow:
        url: https://api.siliconflow.cn
        api-key: ${SILICONFLOW_API_KEY:}
        endpoints:
          chat: /v1/chat/completions
    chat:
      default-model: qwen-plus
      deep-thinking-model: qwen-plus
      candidates:
        - id: qwen-plus
          provider: bailian
          enabled: true
          model: qwen-plus
          supports-thinking: true
          streaming-enabled: true
          priority: 100
          thinking-extra-body:
            enable_thinking: true
        - id: deepseek-v3.2
          provider: bailian
          enabled: true
          model: deepseek-v3.2
          supports-thinking: true
          streaming-enabled: true
          priority: 80
          thinking-extra-body:
            enable_thinking: true
        - id: glm-4.7
          provider: siliconflow
          enabled: true
          model: Pro/zai-org/GLM-4.7
          supports-thinking: true
          streaming-enabled: true
          priority: 60
          thinking-extra-body:
            enable_thinking: true
    embedding:
      default-model: text-embedding-v4
      candidates:
        - id: text-embedding-v4
          provider: bailian
          model: text-embedding-v4
          priority: 100
    rerank:
      default-model: qwen3-vl-rerank
      candidates:
        - id: qwen3-vl-rerank
          provider: bailian
          model: qwen3-vl-rerank
          priority: 100
      top-n: 10
    circuit-breaker:
      failure-threshold: 3
      open-duration-seconds: 60
      half-open-max-probes: 1
      first-token-timeout-millis: 8000
      stream-chunk-idle-timeout-millis: 5000
  rag:
    retrieval:
      top-k: 8
      candidate-multiplier: 3
      enable-global-fallback: true
      chunk-max-tokens: 1200
  memory:
    recent-window-size: 30
    summary-trigger-threshold: 40
    summary-max-tokens: 1800
    redis-cache-ttl-seconds: 2000
  authz:
    admin-role-codes:
      - ADMIN
    default-document-min-rank: 10
  auth:
    # tokenSession 中保存登录用户快照时使用的 key。
    token-session-login-user-key: loginUser
    # 勾选“7天免登录”时，7 天无访问失效；只要持续访问就会滑动续期。
    remember-me-active-timeout-seconds: 604800
    # 记住登录的硬过期上限，防止无限续期。
    remember-me-timeout-seconds: 2592000
    # 未勾选时只保留当前浏览器会话，同时给服务端一个短兜底 TTL。
    session-active-timeout-seconds: 43200
    session-timeout-seconds: 43200
  database:
    # 仅在人工确认需要补历史库结构时临时打开，默认禁止应用启动时执行 DDL。
    intent-node-schema-patch-enabled: false
  trace:
    enabled: true
    # 是否记录每个 RAG 阶段的结构化详情载荷；关闭后详情页只能看到阶段骨架，无法展示原问题、改写、命中 KB、重排结果等明细。
    log-payload: true
    retain-days: 30
